name: Build & deploy gallery

# Builds the gallery index from layouts/, builds the Vue site, and deploys it to GitHub Pages.
# Enable once under Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  pull_request: # build (but don't deploy) PRs so a bad contribution is caught before merge
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # current LTS; Node 20 reached end-of-life (Apr 2026)
      - run: npm install
      - run: npm run build # runs scripts/build-index.mjs (validates every contribution) then vite build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    # Only deploy from the default branch, not from PRs.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
